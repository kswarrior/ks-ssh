# .github/workflows/ks_ssh.yml
name: Build and Run KS SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ks_ssh:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install Nim + nimble
      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH
          nim --version

      # 3️⃣ Install dependencies (mummy) + Build with nimble (as recommended)
      - name: Build with nimble
        run: |
          nimble build -- --threads:on -d:release
        # This automatically installs mummy from package.nimble
        # and passes the exact flags you originally used

      # 4️⃣ Run the compiled KS SSH binary in background
      - name: Run KS SSH
        run: ./ks_ssh &

      # 5️⃣ (Optional) Small wait so server is ready
      - name: Wait for server to start
        run: sleep 3

      # 6️⃣ Install Cloudflare Tunnel and run (exposes public URL)
      - name: Run Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 --no-autoupdate
