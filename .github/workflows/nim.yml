# .github/workflows/ks_ssh.yml
name: Build and Run KS SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ks_ssh:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install Nim
      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          export PATH="$HOME/.nimble/bin:$PATH"
          nim --version

      # 3️⃣ Compile ks_ssh.nim (root of repo)
      - name: Compile ks_ssh.nim
        run: |
          export PATH="$HOME/.nimble/bin:$PATH"
          nim c -d:ssl --threads:on ks_ssh.nim

      # 4️⃣ Run the compiled KS SSH binary in background
      - name: Run KS SSH
        run: ./ks_ssh &

      # 5️⃣ Install Cloudflare Tunnel and run
      - name: Run Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080
