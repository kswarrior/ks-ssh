name: Build and Run KS SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ks_ssh:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install Nim + Nimble
      - name: Install Nim
        run: |
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          # Add Nim & Nimble to PATH for this session
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH
          echo "$HOME/.choosenim/toolchains/nim-2.2.8/bin" >> $GITHUB_PATH
          source $GITHUB_PATH
          nim --version
          nimble --version

      # 3️⃣ Build KS SSH with Nimble (auto installs mummy dependency)
      - name: Build with nimble
        run: |
          nimble install mummy
          nimble build -- --threads:on -d:release

      # 4️⃣ Run KS SSH in background
      - name: Run KS SSH
        run: ./ks_ssh &

      # 5️⃣ Wait a bit for server to start
      - name: Wait for server
        run: sleep 3

      # 6️⃣ Install Cloudflare Tunnel (exposes public URL)
      - name: Run Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 --no-autoupdate
