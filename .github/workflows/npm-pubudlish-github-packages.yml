name: Restore Main to Specific Commit

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    # This block is CRITICAL to fix the 403 error
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Target Commit and Replace Code
        run: |
          # 1. Download specifically from the kswarrior/ks-ssh repo
          curl -L -o commit.zip https://github.com/kswarrior/ks-ssh/archive/26ba2ff91cc2cdc80a823171c24d4dd8fa5f2295.zip
          
          # 2. Extract
          unzip -q commit.zip
          
          # 3. Clean current directory (keeping .git and the new folder)
          find . -maxdepth 1 ! -name '.git' ! -name 'ks-ssh-26ba2ff91cc2cdc80a823171c24d4dd8fa5f2295' ! -name 'commit.zip' ! -name '.' -exec rm -rf {} +
          
          # 4. Move files to root
          cp -a ks-ssh-26ba2ff91cc2cdc80a823171c24d4dd8fa5f2295/. .
          
          # 5. Cleanup
          rm -rf ks-ssh-26ba2ff91cc2cdc80a823171c24d4dd8fa5f2295 commit.zip

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore codebase to match commit 26ba2ff" || echo "No changes to commit"
          git push origin main
