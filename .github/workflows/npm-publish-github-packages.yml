name: Restore Main to Specific Commit

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    # Required to bypass the 403 error
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Target Commit and Replace Code
        run: |
          # 1. Download the specific commit hash zip
          curl -L -o commit.zip https://github.com/kswarrior/ks-ssh/archive/6a0d814397613d3b9fffdf01703d9abb4139a4f6.zip
          
          # 2. Extract the archive
          unzip -q commit.zip
          
          # 3. Define the folder name created by GitHub's zip (repo-hash)
          TARGET_DIR="ks-ssh-6a0d814397613d3b9fffdf01703d9abb4139a4f6"
          
          # 4. Remove current files except .git and our temporary items
          find . -maxdepth 1 ! -name '.git' ! -name "$TARGET_DIR" ! -name 'commit.zip' ! -name '.' -exec rm -rf {} +
          
          # 5. Move the "correct" code into the root
          cp -a "$TARGET_DIR"/. .
          
          # 6. Final cleanup of temp files
          rm -rf "$TARGET_DIR" commit.zip

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          # Only commits if there are differences to avoid errors
          git commit -m "Restoring codebase to specific version (6a0d814)" || echo "No changes to commit"
          
          git push origin main
