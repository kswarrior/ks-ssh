name: KS SSH Testing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download and Unzip
      run: |
        wget https://github.com/kswarrior/ks-ssh/releases/download/zip/ks-ssh.zip
        unzip ks-ssh.zip

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install and Run
      run: |
        cd ks-ssh
        npm install
        npm run build
        
        # Corrected chmod syntax (was x+)
        chmod +x ks-ssh
        ./ks-ssh --port 3000
