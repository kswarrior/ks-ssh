name: KS SSH Testing

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install and Run
      run: |
        node -v || true
        npm run build
        chmod +x ks-ssh
        ./ks-ssh --port 3000
