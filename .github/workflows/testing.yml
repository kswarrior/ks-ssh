name: KS SSH Testing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      run: |
        wget https://github.com/kswarrior/ks-ssh/releases/download/zip/ks-ssh.zip
        unzip ks-ssh.zip

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Or your preferred version

    - name: Install and Run
      run: |
        cd ks-ssh
        npm install
        bash build.sh
        chmod x+ ks-ssh
        ./ks-ssh
